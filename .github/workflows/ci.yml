name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      # Chave anon padrão do supabase start (não é segredo — é o default bem conhecido)
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7urfjjDvC2x8FS3urzFkW1sejme0YyEYEQ0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Iniciar Supabase local
        run: supabase start

      - name: Verificar RLS (check-rls obrigatório)
        run: |
          count=$(supabase db execute --sql \
            "SELECT count(*)::text FROM pg_tables WHERE schemaname='public' AND rowsecurity=false;" \
            | tail -n1 | tr -d ' ')
          if [ -z "$count" ] || [ "$count" -gt "0" ]; then
            echo "ERRO: $count tabela(s) pública(s) sem RLS habilitado." >&2
            supabase db execute --sql \
              "SELECT tablename FROM pg_tables WHERE schemaname='public' AND rowsecurity=false ORDER BY tablename;" >&2
            exit 1
          fi
          echo "check-rls: todas as tabelas têm RLS habilitado ✓"

      - name: Executar testes pgTAP de isolamento
        run: npm run test:rls

      - name: Verificar tipos TypeScript
        run: npm run typecheck

      - name: Lint
        run: npm run lint
