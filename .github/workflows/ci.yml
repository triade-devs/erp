name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      # Credenciais padrão do supabase start — não são segredos
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7urfjjDvC2x8FS3urzFkW1sejme0YyEYEQ0
      DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # supabase start aplica todas as migrations automaticamente e bloqueia até pronto
      - name: Iniciar Supabase local
        run: supabase start

      # Usa psql diretamente — parsing confiável via -t -A (tuplas, sem alinhamento)
      - name: Verificar RLS obrigatório
        run: |
          tables=$(psql "$DATABASE_URL" -t -A \
            -c "SELECT string_agg(tablename, ', ' ORDER BY tablename)
                FROM pg_tables
                WHERE schemaname='public' AND rowsecurity=false;")
          if [ -n "$tables" ]; then
            echo "ERRO: tabelas sem RLS habilitado: $tables" >&2
            echo "Habilite RLS em todas as tabelas de tenant antes de continuar." >&2
            exit 1
          fi
          echo "check-rls: todas as tabelas têm RLS habilitado ✓"

      # supabase test db executa os arquivos .sql em supabase/tests/ via pgTAP
      - name: Executar testes pgTAP de isolamento
        run: npm run test:rls

      - name: Verificar tipos TypeScript
        run: npm run typecheck

      - name: Lint
        run: npm run lint
